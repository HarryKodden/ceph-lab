name: Validate Ceph Cluster

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CEPH_IMAGE: quay.io/ceph/ceph:v18.2.7

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create .env from example
        run: cp .env.example .env

      - name: Create external Docker network (Traefik stub)
        run: docker network create external

      - name: Start Ceph cluster and wait for healthy
        run: docker compose up -d --wait --wait-timeout 600

      - name: Validate cluster health
        run: |
          echo "=== ceph status ==="
          docker compose exec -T mon ceph status

          echo "=== ceph health ==="
          HEALTH=$(docker compose exec -T mon ceph health)
          echo "$HEALTH"
          # HEALTH_WARN is expected for a single-OSD test cluster;
          # only HEALTH_ERR is a real failure.
          if echo "$HEALTH" | grep -q "HEALTH_ERR"; then
            echo "Cluster is in ERROR state — failing."
            exit 1
          fi

          echo "=== ceph osd tree ==="
          docker compose exec -T mon ceph osd tree

          echo "=== ceph df ==="
          docker compose exec -T mon ceph df

      - name: Validate S3 API (RGW)
        env:
          AWS_ACCESS_KEY_ID: s3accesskey12345
          AWS_SECRET_ACCESS_KEY: s3secretkey12345
          AWS_DEFAULT_REGION: us-east-1
        run: |
          # Ports are not published in compose; reach RGW via its container IP
          RGW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' ceph-lab-rgw-1)
          ENDPOINT="http://${RGW_IP}:7480"
          echo "RGW endpoint: $ENDPOINT"

          aws --endpoint-url "$ENDPOINT" s3 mb s3://ci-test-bucket
          aws --endpoint-url "$ENDPOINT" s3 cp - s3://ci-test-bucket/hello.txt <<< "Hello from Ceph CI"

          RESULT=$(aws --endpoint-url "$ENDPOINT" s3 cp s3://ci-test-bucket/hello.txt -)
          echo "Retrieved: $RESULT"
          [ "$RESULT" = "Hello from Ceph CI" ] || { echo "Object content mismatch!"; exit 1; }

          aws --endpoint-url "$ENDPOINT" s3 rm s3://ci-test-bucket/hello.txt
          aws --endpoint-url "$ENDPOINT" s3 rb s3://ci-test-bucket

      - name: Validate IAM API (RGW)
        env:
          AWS_ACCESS_KEY_ID: iamaccess123456
          AWS_SECRET_ACCESS_KEY: iamsecret1234567
          AWS_DEFAULT_REGION: us-east-1
        run: |
          RGW_IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' ceph-lab-rgw-1)
          ENDPOINT="http://${RGW_IP}:7480"

          # List roles — demo-role should exist (created by setup.sh)
          echo "=== Listing IAM roles ==="
          aws --endpoint-url "$ENDPOINT" iam list-roles

          ROLE_ARN=$(aws --endpoint-url "$ENDPOINT" iam list-roles \
            --query 'Roles[?RoleName==`demo-role`].Arn' \
            --output text)
          echo "demo-role ARN: $ROLE_ARN"
          [ -n "$ROLE_ARN" ] || { echo "demo-role not found!"; exit 1; }

          # List users
          echo "=== Listing IAM users ==="
          aws --endpoint-url "$ENDPOINT" iam list-users

          # Assume demo-role as s3user via STS
          echo "=== Assuming demo-role via STS ==="
          STS_CREDS=$(AWS_ACCESS_KEY_ID=s3accesskey12345 \
                      AWS_SECRET_ACCESS_KEY=s3secretkey12345 \
                      aws --endpoint-url "$ENDPOINT" sts assume-role \
                        --role-arn "$ROLE_ARN" \
                        --role-session-name ci-test-session \
                        --output json)
          echo "$STS_CREDS" | python3 -c "
          import sys, json
          c = json.load(sys.stdin)['Credentials']
          print('AccessKeyId:', c['AccessKeyId'][:8], '...')
          print('SessionToken present:', bool(c.get('SessionToken')))
          "

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== bootstrap ==="
          docker compose logs bootstrap || true
          echo "=== mon ==="
          docker compose logs mon || true
          echo "=== mgr ==="
          docker compose logs mgr || true
          echo "=== osd ==="
          docker compose logs osd || true
          echo "=== rgw ==="
          docker compose logs rgw || true

      - name: Teardown
        if: always()
        run: docker compose down -v
